services:
  postgres:
    image: postgres:16-alpine
    container_name: greenproof-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: greenproof
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - greenproof-postgres-data:/var/lib/postgresql/data

volumes:
  greenproof-postgres-data:
